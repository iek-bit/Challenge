<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHALLENGE</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="brand">CHALLENGE</div>
        <div class="status-pill">Local Scores</div>
      </header>

      <main class="view-stack">
        <section class="home-screen" data-view="home">
          <div class="home-card">
            <div class="home-title">CHALLENGE</div>
            <h1>Press Start</h1>
            <button class="start-button" id="startButton">Start</button>
          </div>
        </section>

        <section class="select-screen is-hidden" data-view="select">
          <aside class="tag-sidebar">
            <div class="sidebar-title">Categories</div>
            <nav class="tag-links" id="tagLinks"></nav>
          </aside>

          <div class="game-list" id="gameList"></div>
        </section>

        <section class="game-screen is-hidden" data-view="game">
          <div class="game-hud">
            <div class="hud-bar">
              <div class="score-readout" id="scoreReadout">0000.00</div>
              <div class="missed-readout" id="missedReadout">Missed 0/3</div>
              <div class="hearts-readout is-hidden" id="heartsReadout">❤❤❤</div>
              <button class="exit-button" id="exitButton" type="button">Exit</button>
            </div>
          </div>
          <canvas id="gameCanvas"></canvas>
          <div class="game-over is-hidden" id="gameOver">
            <div class="game-over-card">
              <div class="game-over-title">Game Over</div>
              <div class="game-over-score" id="gameOverScore">Score 0000</div>
              <button class="start-button" id="continueButton" type="button">Continue</button>
            </div>
          </div>
          <div class="mode-select is-hidden" id="raceModeSelect">
            <div class="mode-card">
              <div class="mode-title">Racing Mode</div>
              <div class="mode-actions">
                <button class="start-button" id="raceEndlessBtn" type="button">Endless Highway</button>
                <button class="start-button" id="raceVsBtn" type="button">Race vs Bots</button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div class="info-modal is-hidden" id="infoModal">
      <div class="info-scrim" id="infoScrim"></div>
      <div class="info-card">
        <button class="info-close" id="infoClose" type="button">×</button>
        <div class="info-title" id="infoTitle">Game Preview</div>
        <div class="info-body">
          <canvas id="infoCanvas" width="480" height="270"></canvas>
          <div class="info-text" id="infoText"></div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
